name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    outputs:
      pnpm-store: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @siadlp/shared build

      - name: Generate Prisma client
        run: pnpm --filter backend exec prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @siadlp/shared build

      - name: Lint frontend
        run: pnpm --filter frontend lint
        continue-on-error: true

      - name: Lint backend
        run: pnpm --filter backend lint
        continue-on-error: true

  typecheck-shared:
    name: Type check (shared)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @siadlp/shared typecheck

  test-shared:
    name: Test (shared)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run shared tests with coverage
        run: pnpm --filter @siadlp/shared test:cov

  test-backend-unit:
    name: Test (backend unit)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @siadlp/shared build
      - run: pnpm --filter backend exec prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run backend unit tests
        run: pnpm --filter backend test

  test-backend-integration:
    name: Test (backend integration with pglite)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @siadlp/shared build
      - run: pnpm --filter backend exec prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run integration tests (in-memory pglite)
        run: pnpm --filter backend test:integration
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  test-backend-e2e:
    name: Test (backend e2e)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @siadlp/shared build
      - run: pnpm --filter backend exec prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run backend e2e tests
        run: pnpm --filter backend test:e2e

  test-frontend-component:
    name: Test (frontend component)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @siadlp/shared build

      - name: Run frontend component tests with coverage
        run: pnpm --filter frontend test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/frontend/coverage
          retention-days: 7

  test-frontend-e2e:
    name: Test (frontend e2e Playwright)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @siadlp/shared build

      - name: Install Playwright browsers
        run: pnpm --filter frontend exec playwright install --with-deps chromium

      - name: Run Playwright tests (Chromium only in CI)
        run: pnpm --filter frontend exec playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report
          retention-days: 7

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - test-shared
      - test-backend-unit
      - test-backend-integration
      - test-backend-e2e
      - test-frontend-component
      - test-frontend-e2e
    steps:
      - name: All tests passed
        run: echo "All test jobs completed successfully"
